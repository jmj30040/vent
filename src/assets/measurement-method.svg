  <title id="title">환기량 측정방법</title>
  <desc id="desc">축류휀, 배기용 환기휀과 입기용 환기휀, 구조상 측정이 어려운 덕트의 풍속 측정 위치를 설명하는 안내도</desc>
  <rect width="506" height="337" fill="#fff"/>
  <circle cx="30" cy="14" r="5" fill="#000"/>
  <text x="45" y="18" font-family="Arial, sans-serif" font-size="14" fill="#000">환기량 측정방법</text>

  <g fill="none" stroke="#8a8a8a" stroke-width="1.1">
    <circle cx="91" cy="44" r="12"/>
