  <g font-family="Arial, sans-serif" font-size="14" fill="#000">
    <text x="22" y="233" font-weight="700">① 풍속계를 회전하고 있는 직경선상에 놓고 1분간 측정한다.</text>
    <text x="41" y="255" font-weight="700">오차 발생 여부로 인해 반복측정 후 평균치를 구한다.</text>
    <text x="22" y="279" font-weight="700">② 배기용 환기휀의 경우 돈사 외측으로 부터 배기량을 측정한다.</text>
    <text x="41" y="301" font-weight="700">입기용 환기휀의 경우 돈사 내측으로 부터 입기량을 측정한다.</text>
    <text x="22" y="325" font-weight="700">③ 구조상 돈사 외측에서 측정이 어려울 경우 내측으로 부터 배기량을 측정한다.</text>
  </g>
